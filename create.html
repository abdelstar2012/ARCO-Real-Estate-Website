<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCO</title>
    <link rel="stylesheet" href="Login.css">
</head>
<body>
    <header>
        <h1><img src="images/ARCO-logo-transparent.png" id="logo"></h1>
        <fieldset>
            <h1>Join to ARCO</h1>
            <form>
                <p>Full Name:</p>
                <input type="text" id="email" name="fullname" required>
                <p>Number</p>
                <input type="tel" id="email" name="number" required maxlength="11">
                <p>Email:</p>
                <input type="email" id="email" name="email" required>  
                <p>Password:</p>
                <input type="password" id="password" name="password" required>
                <p>confirm Password</p>
                <input type="password" id="password" name="confirmpassword" required><br><br>
                <input type="submit" value="Sign Up" id="SignIn">
                <hr>
            </form>
            <div>
                <fieldset>
                    <a href="https://www.facebook.com/ARCO" target="_blank">Facebook</a>
                </fieldset>
                <fieldset>
                    <a href="https://twitter.com/ARCO" target="_blank">Twitter</a>
                </fieldset>
                <fieldset>
                    <a href="https://www.instagram.com/ARCO" target="_blank">Instagram</a>
                </fieldset>  
                
            </div>
           

        </fieldset>
        
    </header>
    <footer id="content">
            
                

                <p>&copy; 2023 ARCO. All rights reserved.</p>
                <p>Follow us on:
                    <a href="https://www.facebook.com/ARCO" target="_blank">Facebook</a> |
                    <a href="https://www.twitter.com/ARCO" target="_blank">Twitter</a> |
                    <a href="https://www.instagram.com/ARCO" target="_blank">Instagram</a>
                </p>
           
    </footer>
</body>
</html>
