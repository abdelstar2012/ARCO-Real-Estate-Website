<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCO</title>
    <link rel="stylesheet" href="Login.css">
</head>
<body>
    <header>
        <h1><img src="images/ARCO-logo-transparent.png" id="logo"></h1>
        <fieldset>
            <h1>Sign in to ARCO</h1>
            <form>
                <p>Email:</p>
                <input type="email" id="email" name="email" required>  
                <p>Password:</p>
                <input type="password" id="password" name="password" required><br>
                <a href="#" id="Forgot">Forgot Password?</a><br>
                <input type="submit" value="Sign In" id="SignIn">
                <hr>
            </form>
            <div>
                <fieldset>
                    <a href="https://www.facebook.com/ARCO" target="_blank">Facebook</a>
                </fieldset>
                <fieldset>
                    <a href="https://twitter.com/ARCO" target="_blank">Twitter</a>
                </fieldset>
                <fieldset>
                    <a href="https://www.instagram.com/ARCO" target="_blank">Instagram</a>
                </fieldset>  
                
            </div>
            <p id="New">New to ARCO? <a href="create.html">Create an account</a></p>  

        </fieldset>
        
    </header>
    <footer id="content">
        <p>&copy; 2023 ARCO. All rights reserved.</p>
        <p>Follow us on:
            <a href="https://www.facebook.com/ARCO" target="_blank">Facebook</a> |
            <a href="https://www.twitter.com/ARCO" target="_blank">Twitter</a> |
            <a href="https://www.instagram.com/ARCO" target="_blank">Instagram</a>
        </p>
    </footer>
</body>
</html>
